name: app_kit_example
description: Example app demonstrating app_kit utilities, widgets, and theming.
publish_to: none
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  app_kit:
    path: ../

  stacked: ^3.5.0
  stacked_services: ^1.3.0
  get_it: ^8.3.0

flutter:
  uses-material-design: true
