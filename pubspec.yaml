name: app_kit
description: A collection of production-ready utilities, widgets, theming, and base classes for Stacked-architecture Flutter apps.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Stacked ecosystem
  stacked: ^3.5.0
  stacked_services: ^1.3.0
  get_it: ^8.3.0

  # Networking
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # Consumers add their own font assets. Inter is recommended:
  #
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf   weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf     weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf weight: 800
